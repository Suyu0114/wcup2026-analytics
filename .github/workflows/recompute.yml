name: Recompute

# Matchday recompute: re-runs the pipeline after a manual result is entered.
# Triggered manually (Actions tab), by the admin page via the GitHub API
# (repository_dispatch event_type = 'recompute-request'), or on the knockout-stage
# cron (P17): fd fills the next round's teams after each match settles; the pipeline
# is idempotent and fail-loud, so a run hitting an fd transient just fails and the
# next tick self-heals. REMOVE the schedule after the final (2026-07-19).
on:
  workflow_dispatch:
  repository_dispatch:
    types: [recompute-request]
  schedule:
    - cron: '17 */2 * * *'

# Queue overlapping requests rather than clobbering an in-flight simulation.
concurrency:
  group: recompute
  cancel-in-progress: false

jobs:
  recompute:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Ingest fixtures (settles matches from manual_results)
        run: python -m etl.ingest_fixtures
      # Predict unsettled matches so post-draw knockout rows (ingested above once
      # they have teams) get per-match predictions for their cards. Idempotent
      # upsert on (match_id, model_version); free, so safe on every recompute.
      - name: Predict unsettled matches (incl. new knockout rows)
        run: python -m etl.predict --only-unsettled
      - name: Recompute group standings (actual table)
        run: python -m etl.standings
      - name: Recompute qualification scenarios (W/D/L → status)
        run: python -m etl.scenarios
      # simulate + knockout_sim run once per model version so the ?v= switcher
      # (dc-v1.2 active, dc-v1.1 frozen baseline) has data on every page.
      - name: Simulate group-stage advancement (dc-v1.2)
        run: python -m etl.simulate --model-version dc-v1.2
      - name: Simulate group-stage advancement (dc-v1.1 baseline)
        run: python -m etl.simulate --model-version dc-v1.1
      - name: Simulate knockout bracket (dc-v1.2)
        run: python -m etl.knockout_sim --model-version dc-v1.2
      - name: Simulate knockout bracket (dc-v1.1 baseline)
        run: python -m etl.knockout_sim --model-version dc-v1.1
      - name: Calibrate (model vs market)
        run: python -m etl.calibrate
